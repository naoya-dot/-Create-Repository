<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>DrawMark Precision</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#f8fafc;--muted:#94a3b8;--accent:#38bdf8;--danger:#ef4444}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input{font:inherit}
#app{height:100%;display:grid;grid-template-rows:auto 1fr auto}
header{display:flex;gap:7px;align-items:center;padding:calc(7px + env(safe-area-inset-top)) 8px 7px;background:var(--panel);border-bottom:1px solid var(--line)}
header strong{margin-right:auto}
button,.fileBtn{border:1px solid var(--line);background:#1e293b;color:var(--text);border-radius:9px;padding:8px 10px}
button.active{background:var(--accent);color:#082f49;border-color:var(--accent)}
button:disabled{opacity:.4}
.fileBtn input{display:none}
#wrap{position:relative;overflow:hidden;background:#070b16;touch-action:none}
#stage{position:absolute;left:0;top:0;transform-origin:0 0}
canvas{position:absolute;left:0;top:0}
#ui{pointer-events:none}
#empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}
.toolbar{display:flex;gap:7px;align-items:center;overflow-x:auto;padding:7px 8px calc(7px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line)}
.toolbar::-webkit-scrollbar{display:none}
.group{display:flex;gap:6px;align-items:center;border-right:1px solid var(--line);padding-right:7px}
.group:last-child{border:0}
input[type=color]{width:40px;height:40px;border:0;background:none}
input[type=range]{width:95px}
#textBox{display:none;position:absolute;z-index:20}
#textBox input{font-size:18px;border:2px solid var(--accent);border-radius:8px;padding:8px;min-width:210px}
#measurePanel{display:none;position:absolute;z-index:30;left:8px;right:8px;bottom:8px;background:#111827ee;border:1px solid var(--line);border-radius:14px;padding:10px}
#measurePanel .row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
#measurePanel button{min-width:42px}
#measureStatus{margin-right:auto;font-size:14px}
#loupe{display:none;position:absolute;z-index:25;width:150px;height:150px;border-radius:50%;border:3px solid white;background:#111;overflow:hidden;pointer-events:none;box-shadow:0 4px 20px #0008}
#loupe canvas{position:static;width:150px;height:150px}
#toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);padding:9px 13px;border-radius:999px;background:#020617e8;opacity:0;transition:.2s;z-index:40}
#toast.show{opacity:1}
.small{font-size:12px;color:var(--muted)}
@media(max-width:700px){header strong{display:none};button,.fileBtn{padding:7px 9px}}
</style>
</head>
<body>
<div id="app">
<header>
  <strong>DrawMark Precision</strong>
  <label class="fileBtn">図面を開く<input id="file" type="file" accept=".pdf,.png,.jpg,.jpeg,.dxf,application/pdf,image/png,image/jpeg"></label>
  <button id="fit">全体</button>
  <button id="undo" disabled>↶</button>
  <button id="redo" disabled>↷</button>
  <button id="save">PDF保存</button>
</header>

<main id="wrap">
  <div id="empty">PDF・JPEG・PNG・DXFを開いてください<br>1本指／Apple Pencil：作図　2本指：移動・拡大縮小</div>
  <div id="stage">
    <canvas id="base"></canvas>
    <canvas id="draw"></canvas>
    <canvas id="ui"></canvas>
  </div>
  <div id="textBox"><input id="textInput" placeholder="文字を入力してEnter"></div>
  <div id="loupe"><canvas width="300" height="300"></canvas></div>
  <div id="measurePanel">
    <div class="row">
      <span id="measureStatus">点を選択してください</span>
      <button data-nudge="left">←</button>
      <button data-nudge="up">↑</button>
      <button data-nudge="down">↓</button>
      <button data-nudge="right">→</button>
      <button id="switchPoint">点切替</button>
      <button id="measureConfirm">決定</button>
      <button id="measureCancel">取消</button>
    </div>
    <div class="small">十字をドラッグ、または矢印で1画素ずつ調整できます。</div>
  </div>
  <div id="toast"></div>
</main>

<footer class="toolbar">
  <div class="group" id="tools">
    <button data-tool="pen" class="active">ペン</button>
    <button data-tool="highlighter">蛍光</button>
    <button data-tool="eraser">消しゴム</button>
    <button data-tool="line">直線</button>
    <button data-tool="rect">四角</button>
    <button data-tool="circle">円</button>
    <button data-tool="arrow">矢印</button>
    <button data-tool="text">文字</button>
    <button data-tool="measure">寸法</button>
  </div>
  <div class="group">
    <input id="color" type="color" value="#ef4444">
    <input id="width" type="range" min="1" max="20" value="4">
  </div>
  <button id="clear">書込み消去</button>
</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

const $=s=>document.querySelector(s);
const wrap=$("#wrap"),stage=$("#stage"),base=$("#base"),draw=$("#draw"),ui=$("#ui");
const b=base.getContext("2d"),d=draw.getContext("2d"),u=ui.getContext("2d");
const loupe=$("#loupe"),lc=loupe.querySelector("canvas").getContext("2d");
let W=1200,H=900,zoom=1,panX=0,panY=0,tool="pen",color="#ef4444",lineWidth=4;
let isDrawing=false,start=null,last=null,activePointer=null;
let touches=new Map(),gesture=null;
let history=[],future=[];
let points=[],selectedPoint=0,calibration=null,dragPoint=-1;
let textPos=null;

function toast(msg){const e=$("#toast");e.textContent=msg;e.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove("show"),1800)}
function size(w,h){
 W=Math.round(w);H=Math.round(h);
 for(const c of [base,draw,ui]){c.width=W;c.height=H;c.style.width=W+"px";c.style.height=H+"px"}
 stage.style.width=W+"px";stage.style.height=H+"px";
}
function transform(){stage.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`}
function fit(){const r=wrap.getBoundingClientRect();zoom=Math.min(r.width/W,r.height/H)*.96;panX=(r.width-W*zoom)/2;panY=(r.height-H*zoom)/2;transform()}
function toDoc(cx,cy){const r=wrap.getBoundingClientRect();return{x:(cx-r.left-panX)/zoom,y:(cy-r.top-panY)/zoom}}
function snapshot(){history.push(draw.toDataURL());if(history.length>50)history.shift();future=[];buttons()}
function buttons(){$("#undo").disabled=history.length<=1;$("#redo").disabled=!future.length}
function restore(url){d.clearRect(0,0,W,H);if(!url)return;const im=new Image();im.onload=()=>d.drawImage(im,0,0);im.src=url}
function style(ctx,alpha=1){ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lineWidth/zoom;ctx.globalAlpha=(tool==="highlighter"?.28:1)*alpha}
function clearUI(){u.clearRect(0,0,W,H)}
function arrow(ctx,a,z){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(z.x,z.y);ctx.stroke();const ang=Math.atan2(z.y-a.y,z.x-a.x),q=15/zoom;ctx.beginPath();ctx.moveTo(z.x,z.y);ctx.lineTo(z.x-q*Math.cos(ang-.5),z.y-q*Math.sin(ang-.5));ctx.moveTo(z.x,z.y);ctx.lineTo(z.x-q*Math.cos(ang+.5),z.y-q*Math.sin(ang+.5));ctx.stroke()}
function shape(ctx,a,z){style(ctx,ctx===u?.85:1);if(tool==="line"){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(z.x,z.y);ctx.stroke()}if(tool==="rect")ctx.strokeRect(a.x,a.y,z.x-a.x,z.y-a.y);if(tool==="circle"){ctx.beginPath();ctx.ellipse(a.x,a.y,Math.abs(z.x-a.x),Math.abs(z.y-a.y),0,0,Math.PI*2);ctx.stroke()}if(tool==="arrow")arrow(ctx,a,z);ctx.globalAlpha=1}

function renderMeasure(){
 clearUI();
 if(!points.length)return;
 u.save();u.strokeStyle="#00bfff";u.fillStyle="#00bfff";u.lineWidth=1.5/zoom;
 points.forEach((p,i)=>{
   const q=7/zoom;u.beginPath();u.moveTo(p.x-q,p.y);u.lineTo(p.x+q,p.y);u.moveTo(p.x,p.y-q);u.lineTo(p.x,p.y+q);u.stroke();
   if(i===selectedPoint){u.beginPath();u.arc(p.x,p.y,11/zoom,0,Math.PI*2);u.stroke()}
 });
 if(points.length===2){
   u.beginPath();u.moveTo(points[0].x,points[0].y);u.lineTo(points[1].x,points[1].y);u.stroke();
   const px=Math.hypot(points[1].x-points[0].x,points[1].y-points[0].y);
   const label=calibration?(px*calibration).toFixed(0)+" mm":px.toFixed(2)+" px";
   u.font=`${17/zoom}px sans-serif`;u.textAlign="center";u.fillText(label,(points[0].x+points[1].x)/2,(points[0].y+points[1].y)/2-8/zoom);
 }
 u.restore();
 $("#measurePanel").style.display="block";
 $("#measureStatus").textContent=points.length<2?`点${points.length+1}を選択してください`:`点${selectedPoint+1}を調整中`;
}
function showLoupe(p,cx,cy){
 loupe.style.display="block";
 const r=wrap.getBoundingClientRect(),left=Math.min(r.width-158,Math.max(8,cx-r.left+28)),top=Math.min(r.height-158,Math.max(8,cy-r.top-178));
 loupe.style.left=left+"px";loupe.style.top=top+"px";
 lc.clearRect(0,0,300,300);lc.fillStyle="white";lc.fillRect(0,0,300,300);
 const crop=36,source=document.createElement("canvas");source.width=W;source.height=H;const sc=source.getContext("2d");sc.drawImage(base,0,0);sc.drawImage(draw,0,0);
 lc.imageSmoothingEnabled=false;lc.drawImage(source,p.x-crop/2,p.y-crop/2,crop,crop,0,0,300,300);
 lc.strokeStyle="#00bfff";lc.lineWidth=2;lc.beginPath();lc.moveTo(150,0);lc.lineTo(150,300);lc.moveTo(0,150);lc.lineTo(300,150);lc.stroke();
}
function hideLoupe(){loupe.style.display="none"}

async function load(file){
 const ext=file.name.split(".").pop().toLowerCase();$("#empty").style.display="none";points=[];calibration=null;
 if(ext==="pdf"){
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise,page=await pdf.getPage(1),v0=page.getViewport({scale:1}),s=2000/Math.max(v0.width,v0.height),v=page.getViewport({scale:s});size(v.width,v.height);await page.render({canvasContext:b,viewport:v}).promise;
 }else if(["png","jpg","jpeg"].includes(ext)){
  const im=new Image(),url=URL.createObjectURL(file);await new Promise((ok,no)=>{im.onload=ok;im.onerror=no;im.src=url});size(im.naturalWidth,im.naturalHeight);b.drawImage(im,0,0);URL.revokeObjectURL(url);
 }else if(ext==="dxf"){renderDXF(await file.text())}else return;
 d.clearRect(0,0,W,H);history=[draw.toDataURL()];future=[];buttons();fit();toast("図面を読み込みました");
}
function renderDXF(text){
 const data=new window.DxfParser().parseSync(text),es=data.entities||[];let xs=[],ys=[];const add=(x,y)=>{if(isFinite(x)&&isFinite(y)){xs.push(x);ys.push(y)}};
 es.forEach(e=>{(e.vertices||[]).forEach(v=>add(v.x,v.y));if(e.center){add(e.center.x-e.radius,e.center.y-e.radius);add(e.center.x+e.radius,e.center.y+e.radius)}});
 if(!xs.length)throw new Error("DXF表示対象なし");
 const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);size(1800,Math.max(1000,1800*(maxY-minY||1)/(maxX-minX||1)));b.fillStyle="white";b.fillRect(0,0,W,H);b.strokeStyle="#111";const pad=50,s=Math.min((W-2*pad)/(maxX-minX||1),(H-2*pad)/(maxY-minY||1)),p=(x,y)=>({x:pad+(x-minX)*s,y:H-pad-(y-minY)*s});
 es.forEach(e=>{b.beginPath();if(e.type==="LINE"&&e.vertices?.length>1){let a=p(e.vertices[0].x,e.vertices[0].y),z=p(e.vertices[1].x,e.vertices[1].y);b.moveTo(a.x,a.y);b.lineTo(z.x,z.y);b.stroke()}else if(["LWPOLYLINE","POLYLINE"].includes(e.type)&&e.vertices?.length){let a=p(e.vertices[0].x,e.vertices[0].y);b.moveTo(a.x,a.y);e.vertices.slice(1).forEach(v=>{let q=p(v.x,v.y);b.lineTo(q.x,q.y)});if(e.shape)b.closePath();b.stroke()}else if(e.type==="CIRCLE"){let c=p(e.center.x,e.center.y);b.arc(c.x,c.y,e.radius*s,0,Math.PI*2);b.stroke()}});
}

$("#file").addEventListener("change",e=>e.target.files[0]&&load(e.target.files[0]).catch(x=>alert(x.message)));
$("#fit").onclick=fit;
$("#tools").onclick=e=>{const q=e.target.closest("[data-tool]");if(!q)return;tool=q.dataset.tool;document.querySelectorAll("[data-tool]").forEach(x=>x.classList.toggle("active",x===q));points=[];clearUI();$("#measurePanel").style.display="none"};
$("#color").oninput=e=>color=e.target.value;$("#width").oninput=e=>lineWidth=+e.target.value;
$("#clear").onclick=()=>{if(confirm("書き込みを消去しますか？")){d.clearRect(0,0,W,H);snapshot()}};
$("#undo").onclick=()=>{if(history.length>1){future.push(history.pop());restore(history.at(-1));buttons()}};
$("#redo").onclick=()=>{if(future.length){let x=future.pop();history.push(x);restore(x);buttons()}};
$("#save").onclick=()=>{const out=document.createElement("canvas");out.width=W;out.height=H;const c=out.getContext("2d");c.drawImage(base,0,0);c.drawImage(draw,0,0);const {jsPDF}=window.jspdf,pdf=new jsPDF({orientation:W>H?"landscape":"portrait",unit:"px",format:[W,H]});pdf.addImage(out.toDataURL("image/jpeg",.95),"JPEG",0,0,W,H);pdf.save("DrawMark_図面.pdf")};

function down(e){
 if(e.pointerType==="touch"){touches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(touches.size===2){const a=[...touches.values()],mid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};gesture={mid,dist:Math.hypot(a[1].x-a[0].x,a[1].y-a[0].y),zoom,panX,panY};isDrawing=false;clearUI();return}}
 if(touches.size>=2)return;
 const p=toDoc(e.clientX,e.clientY);activePointer=e.pointerId;
 if(tool==="text"){textPos=p;const r=wrap.getBoundingClientRect(),box=$("#textBox");box.style.display="block";box.style.left=(e.clientX-r.left)+"px";box.style.top=(e.clientY-r.top)+"px";$("#textInput").value="";$("#textInput").focus();return}
 if(tool==="measure"){
   let nearest=-1,best=18/zoom;points.forEach((q,i)=>{const z=Math.hypot(q.x-p.x,q.y-p.y);if(z<best){best=z;nearest=i}});
   if(nearest>=0){dragPoint=nearest;selectedPoint=nearest}else if(points.length<2){points.push(p);selectedPoint=points.length-1;dragPoint=selectedPoint}else{points=[p];selectedPoint=0;dragPoint=0}
   renderMeasure();showLoupe(points[selectedPoint],e.clientX,e.clientY);draw.setPointerCapture(e.pointerId);return;
 }
 isDrawing=true;start=last=p;draw.setPointerCapture(e.pointerId);if(["pen","highlighter","eraser"].includes(tool))snapshot();
}
function move(e){
 if(e.pointerType==="touch"&&touches.has(e.pointerId)){touches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(touches.size===2&&gesture){const a=[...touches.values()],mid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2},dist=Math.hypot(a[1].x-a[0].x,a[1].y-a[0].y),nz=Math.min(16,Math.max(.06,gesture.zoom*dist/gesture.dist)),r=wrap.getBoundingClientRect(),dx=(gesture.mid.x-r.left-gesture.panX)/gesture.zoom,dy=(gesture.mid.y-r.top-gesture.panY)/gesture.zoom;zoom=nz;panX=mid.x-r.left-dx*zoom;panY=mid.y-r.top-dy*zoom;transform();return}}
 if(tool==="measure"&&dragPoint>=0&&e.pointerId===activePointer){points[dragPoint]=toDoc(e.clientX,e.clientY);renderMeasure();showLoupe(points[dragPoint],e.clientX,e.clientY);return}
 if(!isDrawing||e.pointerId!==activePointer)return;const p=toDoc(e.clientX,e.clientY);
 if(["pen","highlighter"].includes(tool)){d.save();style(d);d.beginPath();d.moveTo(last.x,last.y);d.lineTo(p.x,p.y);d.stroke();d.restore();last=p}
 else if(tool==="eraser"){d.save();d.globalCompositeOperation="destination-out";d.lineCap="round";d.lineWidth=lineWidth*4/zoom;d.beginPath();d.moveTo(last.x,last.y);d.lineTo(p.x,p.y);d.stroke();d.restore();last=p}
 else{clearUI();shape(u,start,p)}
}
function up(e){
 if(e.pointerType==="touch"){touches.delete(e.pointerId);if(touches.size<2)gesture=null}
 if(tool==="measure"&&e.pointerId===activePointer){dragPoint=-1;activePointer=null;hideLoupe();renderMeasure();return}
 if(!isDrawing||e.pointerId!==activePointer)return;const p=toDoc(e.clientX,e.clientY);
 if(["line","rect","circle","arrow"].includes(tool)){clearUI();shape(d,start,p);snapshot()}else if(["pen","highlighter","eraser"].includes(tool)){history[history.length-1]=draw.toDataURL();buttons()}
 isDrawing=false;activePointer=null;
}
draw.addEventListener("pointerdown",down);draw.addEventListener("pointermove",move);draw.addEventListener("pointerup",up);draw.addEventListener("pointercancel",up);

$("#textInput").addEventListener("keydown",e=>{if(e.key==="Enter"){const t=e.target.value.trim();if(t){d.save();d.fillStyle=color;d.font=`${Math.max(18,lineWidth*4)/zoom}px sans-serif`;d.fillText(t,textPos.x,textPos.y);d.restore();snapshot()}$("#textBox").style.display="none";textPos=null}});
document.querySelectorAll("[data-nudge]").forEach(btn=>btn.onclick=()=>{if(!points.length)return;const p=points[selectedPoint],step=1;const dir=btn.dataset.nudge;if(dir==="left")p.x-=step;if(dir==="right")p.x+=step;if(dir==="up")p.y-=step;if(dir==="down")p.y+=step;renderMeasure()});
$("#switchPoint").onclick=()=>{if(points.length===2){selectedPoint=1-selectedPoint;renderMeasure()}};
$("#measureCancel").onclick=()=>{points=[];clearUI();$("#measurePanel").style.display="none"};
$("#measureConfirm").onclick=()=>{
 if(points.length!==2){toast("2点を選択してください");return}
 const px=Math.hypot(points[1].x-points[0].x,points[1].y-points[0].y);
 if(!calibration){const v=parseFloat(prompt("この2点間の実寸をmmで入力してください","1000"));if(v>0){calibration=v/px;toast("基準寸法を設定しました")}}
 else{d.save();style(d);arrow(d,points[0],points[1]);arrow(d,points[1],points[0]);const mm=px*calibration;d.font=`${18/zoom}px sans-serif`;d.textAlign="center";d.fillText(mm.toFixed(0)+" mm",(points[0].x+points[1].x)/2,(points[0].y+points[1].y)/2-9/zoom);d.restore();snapshot();toast("寸法を書き込みました")}
 points=[];clearUI();$("#measurePanel").style.display="none";
};
window.addEventListener("resize",fit);
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
size(W,H);fit();history=[draw.toDataURL()];buttons();
</script>
</body>
</html>
