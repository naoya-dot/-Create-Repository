<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>DrawMark MVP</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#0f172a;--panel:#111827;--line:#334155;--text:#f8fafc;--muted:#94a3b8;
  --accent:#38bdf8;--danger:#ef4444;--ok:#22c55e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select{font:inherit}
#app{height:100%;display:grid;grid-template-rows:auto 1fr auto}
header{display:flex;align-items:center;gap:8px;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;background:var(--panel);border-bottom:1px solid var(--line)}
header .title{font-weight:700;margin-right:auto}
button,.file-btn{border:1px solid var(--line);background:#1e293b;color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}
button.active{background:var(--accent);color:#082f49;border-color:var(--accent)}
button:disabled{opacity:.45}
.file-btn input{display:none}
#stageWrap{position:relative;overflow:hidden;background:#0b1020;touch-action:none}
#stage{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#baseCanvas,#drawCanvas,#uiCanvas{position:absolute;left:0;top:0}
#drawCanvas,#uiCanvas{touch-action:none}
#uiCanvas{pointer-events:none}
#empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:24px;pointer-events:none}
.toolbar{display:flex;gap:8px;align-items:center;overflow-x:auto;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line)}
.toolbar::-webkit-scrollbar{display:none}
.group{display:flex;gap:6px;align-items:center;padding-right:8px;border-right:1px solid var(--line)}
.group:last-child{border-right:0}
input[type=color]{width:42px;height:42px;border:0;background:none;padding:0}
input[type=range]{width:110px}
select{background:#1e293b;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px}
.badge{font-size:12px;color:var(--muted);white-space:nowrap}
#toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%);background:#020617dd;color:white;padding:10px 14px;border-radius:999px;opacity:0;transition:.2s;pointer-events:none;z-index:20}
#toast.show{opacity:1}
#textEditor{position:absolute;display:none;z-index:10}
#textEditor input{min-width:180px;padding:8px;border-radius:8px;border:2px solid var(--accent);font-size:18px}
@media(max-width:700px){
  header .title{display:none}
  button,.file-btn{padding:8px 10px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">DrawMark MVP</div>
    <label class="file-btn">図面を開く<input id="fileInput" type="file" accept=".pdf,.png,.jpg,.jpeg,.dxf,application/pdf,image/png,image/jpeg"></label>
    <button id="fitBtn">全体表示</button>
    <button id="undoBtn" disabled>↶</button>
    <button id="redoBtn" disabled>↷</button>
    <button id="exportBtn">PDF保存</button>
  </header>

  <main id="stageWrap">
    <div id="empty">PDF・JPEG・PNG・DXFを読み込んでください<br>Apple Pencilで描画／指2本で移動・拡大縮小</div>
    <div id="stage">
      <canvas id="baseCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
      <canvas id="uiCanvas"></canvas>
    </div>
    <div id="textEditor"><input id="textInput" placeholder="文字を入力してEnter"></div>
    <div id="toast"></div>
  </main>

  <footer class="toolbar">
    <div class="group" id="tools">
      <button data-tool="pen" class="active">ペン</button>
      <button data-tool="highlighter">蛍光</button>
      <button data-tool="eraser">消しゴム</button>
      <button data-tool="line">直線</button>
      <button data-tool="rect">四角</button>
      <button data-tool="circle">円</button>
      <button data-tool="arrow">矢印</button>
      <button data-tool="text">文字</button>
      <button data-tool="measure">寸法</button>
    </div>
    <div class="group">
      <input id="color" type="color" value="#ef4444" aria-label="色">
      <span class="badge">太さ</span>
      <input id="width" type="range" min="1" max="24" value="4">
    </div>
    <div class="group">
      <button id="clearBtn">書込み消去</button>
    </div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

const $=s=>document.querySelector(s);
const wrap=$("#stageWrap"), stage=$("#stage");
const base=$("#baseCanvas"), draw=$("#drawCanvas"), ui=$("#uiCanvas");
const bctx=base.getContext("2d"), dctx=draw.getContext("2d"), uctx=ui.getContext("2d");
const fileInput=$("#fileInput"), empty=$("#empty"), toast=$("#toast");
let docW=1200, docH=900, scale=1, tx=0, ty=0;
let tool="pen", color="#ef4444", width=4;
let drawing=false, start=null, last=null, currentPointer=null;
let history=[], redoStack=[];
let touchPoints=new Map(), gestureStart=null;
let calibrated=false, calibration=null, measurePoints=[];
let textPos=null;

function showToast(msg){
  toast.textContent=msg;toast.classList.add("show");
  clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove("show"),1800);
}
function setSize(w,h){
  docW=Math.max(1,Math.round(w));docH=Math.max(1,Math.round(h));
  [base,draw,ui].forEach(c=>{c.width=docW;c.height=docH;c.style.width=docW+"px";c.style.height=docH+"px"});
  stage.style.width=docW+"px";stage.style.height=docH+"px";
}
function applyTransform(){stage.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function fit(){
  const r=wrap.getBoundingClientRect();
  scale=Math.min(r.width/docW,r.height/docH)*0.96;
  tx=(r.width-docW*scale)/2;ty=(r.height-docH*scale)/2;
  applyTransform();
}
function screenToDoc(x,y){
  const r=wrap.getBoundingClientRect();
  return {x:(x-r.left-tx)/scale,y:(y-r.top-ty)/scale};
}
function saveHistory(){
  history.push(draw.toDataURL("image/png"));
  if(history.length>40)history.shift();
  redoStack=[];updateUndo();
}
function restore(url){
  dctx.clearRect(0,0,docW,docH);
  if(!url)return;
  const im=new Image();im.onload=()=>dctx.drawImage(im,0,0);im.src=url;
}
function updateUndo(){
  $("#undoBtn").disabled=history.length<=1;
  $("#redoBtn").disabled=redoStack.length===0;
}
function lineStyle(ctx,preview=false){
  ctx.lineCap="round";ctx.lineJoin="round";
  ctx.strokeStyle=color;ctx.fillStyle=color;
  ctx.lineWidth=width/scale;
  ctx.globalAlpha=tool==="highlighter"?0.28:1;
  if(preview)ctx.globalAlpha*=0.85;
}
function clearUI(){uctx.clearRect(0,0,docW,docH)}
function drawArrow(ctx,a,b){
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  const ang=Math.atan2(b.y-a.y,b.x-a.x),len=14/scale;
  ctx.beginPath();
  ctx.moveTo(b.x,b.y);
  ctx.lineTo(b.x-len*Math.cos(ang-Math.PI/6),b.y-len*Math.sin(ang-Math.PI/6));
  ctx.moveTo(b.x,b.y);
  ctx.lineTo(b.x-len*Math.cos(ang+Math.PI/6),b.y-len*Math.sin(ang+Math.PI/6));
  ctx.stroke();
}
function drawShape(ctx,a,b){
  lineStyle(ctx,ctx===uctx);
  if(tool==="line"){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
  if(tool==="rect"){ctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y)}
  if(tool==="circle"){
    const rx=Math.abs(b.x-a.x),ry=Math.abs(b.y-a.y);
    ctx.beginPath();ctx.ellipse(a.x,a.y,rx,ry,0,0,Math.PI*2);ctx.stroke();
  }
  if(tool==="arrow")drawArrow(ctx,a,b);
  ctx.globalAlpha=1;
}
function renderMeasure(){
  clearUI();
  if(measurePoints.length===0)return;
  uctx.save();uctx.strokeStyle="#38bdf8";uctx.fillStyle="#38bdf8";uctx.lineWidth=2/scale;
  for(const p of measurePoints){
    const s=8/scale;uctx.beginPath();uctx.moveTo(p.x-s,p.y);uctx.lineTo(p.x+s,p.y);uctx.moveTo(p.x,p.y-s);uctx.lineTo(p.x,p.y+s);uctx.stroke();
  }
  if(measurePoints.length===2){
    const [a,b]=measurePoints;uctx.beginPath();uctx.moveTo(a.x,a.y);uctx.lineTo(b.x,b.y);uctx.stroke();
    const px=Math.hypot(b.x-a.x,b.y-a.y);
    let label=px.toFixed(1)+" px";
    if(calibrated)label=(px*calibration.mmPerPx).toFixed(0)+" mm";
    uctx.font=`${16/scale}px sans-serif`;uctx.textAlign="center";uctx.textBaseline="bottom";
    uctx.fillText(label,(a.x+b.x)/2,(a.y+b.y)/2-6/scale);
  }
  uctx.restore();
}
function commitMeasure(){
  if(measurePoints.length!==2)return;
  const [a,b]=measurePoints;
  if(!calibrated){
    const val=prompt("この2点間の実寸をmmで入力してください","1000");
    const mm=parseFloat(val);
    if(mm>0){
      const px=Math.hypot(b.x-a.x,b.y-a.y);
      calibration={mmPerPx:mm/px};calibrated=true;
      showToast("基準寸法を設定しました");
    }
  }else{
    dctx.save();lineStyle(dctx);
    drawArrow(dctx,a,b);drawArrow(dctx,b,a);
    const px=Math.hypot(b.x-a.x,b.y-a.y),mm=px*calibration.mmPerPx;
    dctx.font=`${18/scale}px sans-serif`;dctx.textAlign="center";dctx.textBaseline="bottom";
    dctx.fillText(mm.toFixed(0)+" mm",(a.x+b.x)/2,(a.y+b.y)/2-8/scale);
    dctx.restore();saveHistory();
  }
  measurePoints=[];clearUI();
}

async function loadFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  empty.style.display="none";calibrated=false;calibration=null;measurePoints=[];
  if(ext==="pdf"){
    const data=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data}).promise;
    const page=await pdf.getPage(1);
    const vp0=page.getViewport({scale:1});
    const target=1800/Math.max(vp0.width,vp0.height);
    const vp=page.getViewport({scale:target});
    setSize(vp.width,vp.height);
    await page.render({canvasContext:bctx,viewport:vp}).promise;
    showToast(`PDF 1ページ目を読込（全${pdf.numPages}ページ）`);
  }else if(ext==="png"||ext==="jpg"||ext==="jpeg"){
    const url=URL.createObjectURL(file);
    const im=new Image();
    await new Promise((res,rej)=>{im.onload=res;im.onerror=rej;im.src=url});
    setSize(im.naturalWidth,im.naturalHeight);bctx.drawImage(im,0,0);URL.revokeObjectURL(url);
  }else if(ext==="dxf"){
    const text=await file.text();
    renderDXF(text);
  }else{showToast("未対応形式です");return}
  dctx.clearRect(0,0,docW,docH);history=[draw.toDataURL("image/png")];redoStack=[];updateUndo();fit();
}

function renderDXF(text){
  const parser=new window.DxfParser();
  let dxf;
  try{dxf=parser.parseSync(text)}catch(e){alert("DXFの解析に失敗しました");return}
  const ents=dxf.entities||[];
  let xs=[],ys=[];
  const add=(x,y)=>{if(Number.isFinite(x)&&Number.isFinite(y)){xs.push(x);ys.push(y)}};
  for(const e of ents){
    if(e.vertices)for(const v of e.vertices)add(v.x,v.y);
    if(e.start)add(e.start.x,e.start.y);if(e.end)add(e.end.x,e.end.y);
    if(e.center){add(e.center.x-e.radius,e.center.y-e.radius);add(e.center.x+e.radius,e.center.y+e.radius)}
  }
  if(!xs.length){alert("表示できる2D図形がありません");return}
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const pad=60,w=1600,h=Math.max(900,1600*(maxY-minY||1)/(maxX-minX||1));
  setSize(w,h);bctx.fillStyle="white";bctx.fillRect(0,0,w,h);bctx.strokeStyle="#111";bctx.lineWidth=1;
  const sx=(w-pad*2)/(maxX-minX||1),sy=(h-pad*2)/(maxY-minY||1),s=Math.min(sx,sy);
  const p=(x,y)=>({x:pad+(x-minX)*s,y:h-pad-(y-minY)*s});
  for(const e of ents){
    bctx.beginPath();
    if(e.type==="LINE"&&e.vertices?.length>=2){const a=p(e.vertices[0].x,e.vertices[0].y),b=p(e.vertices[1].x,e.vertices[1].y);bctx.moveTo(a.x,a.y);bctx.lineTo(b.x,b.y);bctx.stroke()}
    else if((e.type==="LWPOLYLINE"||e.type==="POLYLINE")&&e.vertices?.length){const a=p(e.vertices[0].x,e.vertices[0].y);bctx.moveTo(a.x,a.y);for(const v of e.vertices.slice(1)){const q=p(v.x,v.y);bctx.lineTo(q.x,q.y)}if(e.shape)bctx.closePath();bctx.stroke()}
    else if(e.type==="CIRCLE"){const c=p(e.center.x,e.center.y);bctx.arc(c.x,c.y,e.radius*s,0,Math.PI*2);bctx.stroke()}
    else if(e.type==="ARC"){const c=p(e.center.x,e.center.y);bctx.arc(c.x,c.y,e.radius*s,-e.endAngle,-e.startAngle);bctx.stroke()}
  }
  showToast("DXFを読み込みました");
}

fileInput.addEventListener("change",e=>{const f=e.target.files[0];if(f)loadFile(f)});
$("#fitBtn").addEventListener("click",fit);
$("#tools").addEventListener("click",e=>{
  const b=e.target.closest("button[data-tool]");if(!b)return;
  tool=b.dataset.tool;document.querySelectorAll("[data-tool]").forEach(x=>x.classList.toggle("active",x===b));
  measurePoints=[];clearUI();
});
$("#color").addEventListener("input",e=>color=e.target.value);
$("#width").addEventListener("input",e=>width=+e.target.value);
$("#clearBtn").addEventListener("click",()=>{if(confirm("書き込みをすべて消去しますか？")){dctx.clearRect(0,0,docW,docH);saveHistory()}});
$("#undoBtn").addEventListener("click",()=>{
  if(history.length<=1)return;
  redoStack.push(history.pop());restore(history.at(-1));updateUndo();
});
$("#redoBtn").addEventListener("click",()=>{
  if(!redoStack.length)return;
  const x=redoStack.pop();history.push(x);restore(x);updateUndo();
});
$("#exportBtn").addEventListener("click",()=>{
  const out=document.createElement("canvas");out.width=docW;out.height=docH;
  const c=out.getContext("2d");c.drawImage(base,0,0);c.drawImage(draw,0,0);
  const img=out.toDataURL("image/jpeg",0.95);
  const {jsPDF}=window.jspdf;
  const orient=docW>=docH?"landscape":"portrait";
  const pdf=new jsPDF({orientation:orient,unit:"px",format:[docW,docH]});
  pdf.addImage(img,"JPEG",0,0,docW,docH);
  pdf.save("DrawMark_書込み図面.pdf");
});

function pointerDown(e){
  if(e.pointerType==="touch"){
    touchPoints.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(touchPoints.size===2){
      const pts=[...touchPoints.values()];
      const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      gestureStart={mid,dist,scale,tx,ty};
      drawing=false;clearUI();return;
    }
    if(e.pointerType==="touch" && tool!=="text" && tool!=="measure") return;
  }
  if(touchPoints.size>=2)return;
  const p=screenToDoc(e.clientX,e.clientY);
  currentPointer=e.pointerId;
  if(tool==="text"){
    textPos=p;
    const r=wrap.getBoundingClientRect();
    const ed=$("#textEditor");ed.style.display="block";ed.style.left=(e.clientX-r.left)+"px";ed.style.top=(e.clientY-r.top)+"px";
    $("#textInput").value="";$("#textInput").focus();return;
  }
  if(tool==="measure"){
    measurePoints.push(p);if(measurePoints.length>2)measurePoints=[p];
    renderMeasure();if(measurePoints.length===2)setTimeout(commitMeasure,80);return;
  }
  drawing=true;start=last=p;draw.setPointerCapture(e.pointerId);
  if(tool==="pen"||tool==="highlighter"||tool==="eraser")saveHistory();
}
function pointerMove(e){
  if(e.pointerType==="touch"&&touchPoints.has(e.pointerId)){
    touchPoints.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(touchPoints.size===2&&gestureStart){
      const pts=[...touchPoints.values()];
      const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      const newScale=Math.min(12,Math.max(.08,gestureStart.scale*dist/gestureStart.dist));
      const docX=(gestureStart.mid.x-wrap.getBoundingClientRect().left-gestureStart.tx)/gestureStart.scale;
      const docY=(gestureStart.mid.y-wrap.getBoundingClientRect().top-gestureStart.ty)/gestureStart.scale;
      scale=newScale;
      tx=mid.x-wrap.getBoundingClientRect().left-docX*scale;
      ty=mid.y-wrap.getBoundingClientRect().top-docY*scale;
      applyTransform();return;
    }
  }
  if(!drawing||e.pointerId!==currentPointer)return;
  const p=screenToDoc(e.clientX,e.clientY);
  if(tool==="pen"||tool==="highlighter"){
    dctx.save();lineStyle(dctx);dctx.beginPath();dctx.moveTo(last.x,last.y);dctx.lineTo(p.x,p.y);dctx.stroke();dctx.restore();last=p;
  }else if(tool==="eraser"){
    dctx.save();dctx.globalCompositeOperation="destination-out";dctx.lineCap="round";dctx.lineWidth=(width*4)/scale;dctx.beginPath();dctx.moveTo(last.x,last.y);dctx.lineTo(p.x,p.y);dctx.stroke();dctx.restore();last=p;
  }else{clearUI();drawShape(uctx,start,p)}
}
function pointerUp(e){
  if(e.pointerType==="touch"){
    touchPoints.delete(e.pointerId);
    if(touchPoints.size<2)gestureStart=null;
  }
  if(!drawing||e.pointerId!==currentPointer)return;
  const p=screenToDoc(e.clientX,e.clientY);
  if(["line","rect","circle","arrow"].includes(tool)){clearUI();drawShape(dctx,start,p);saveHistory()}
  else if(["pen","highlighter","eraser"].includes(tool)){history[history.length-1]=draw.toDataURL("image/png");updateUndo()}
  drawing=false;currentPointer=null;
}
draw.addEventListener("pointerdown",pointerDown);
draw.addEventListener("pointermove",pointerMove);
draw.addEventListener("pointerup",pointerUp);
draw.addEventListener("pointercancel",pointerUp);

$("#textInput").addEventListener("keydown",e=>{
  if(e.key!=="Enter")return;
  const val=e.target.value.trim();
  if(val&&textPos){
    dctx.save();dctx.fillStyle=color;dctx.font=`${Math.max(14,width*4)/scale}px sans-serif`;dctx.fillText(val,textPos.x,textPos.y);dctx.restore();saveHistory();
  }
  $("#textEditor").style.display="none";textPos=null;
});
window.addEventListener("resize",()=>{if(base.width)fit()});
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
setSize(docW,docH);fit();history=[draw.toDataURL("image/png")];updateUndo();
</script>
</body>
</html>
